<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026志工週：舊愛新歡市集查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 將底圖設置為背景 */
            background-image: url('舊愛新歡頁面底圖-01.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-morphism {
            /* 稍微提高背景模糊度與透明度，確保文字在鮮豔背景下仍可辨識 */
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-link-btn {
            background: linear-gradient(90deg, #ff0000 0%, #cc0000 100%);
            transition: all 0.3s ease;
        }

        .video-link-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        /* 讓標題在背景上更突出 */
        .page-title {
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-2xl mx-auto">
    <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2 page-title">
            <i class="fas fa-heart text-red-500 mr-2"></i>2026 志工週
        </h1>
        <p class="text-xl text-gray-700 font-bold mb-6 page-title">舊愛新歡市集：登記資料查詢</p>
        
        <a href="https://youtu.be/b4SRZurGg1c?si=hCT4PAkEn7EhBTCf" target="_blank" 
           class="video-link-btn inline-flex items-center px-6 py-3 text-white font-bold rounded-full shadow-lg">
            <i class="fab fa-youtube mr-2"></i>新歡回饋
        </a>
    </div>

    <div class="glass-morphism rounded-2xl p-6 shadow-xl mb-6">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-search text-gray-400"></i>
                </div>
                <input type="number" id="searchInput" 
                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all" 
                    placeholder="請輸入編號 (例如: 1)">
            </div>
            <button onclick="performSearch()" 
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg">
                立即查詢
            </button>
        </div>
        <p id="errorTip" class="text-red-500 text-sm mt-2 hidden">請輸入有效的編號</p>
    </div>

    <div id="resultContainer" class="hidden">
        <div class="glass-morphism rounded-2xl shadow-2xl overflow-hidden fade-in">
            <div class="bg-blue-600 px-6 py-4 text-white flex justify-between items-center">
                <h3 class="text-lg font-bold">查詢結果</h3>
                <span id="displayId" class="bg-blue-800 px-3 py-1 rounded-full text-sm">編號 #0</span>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">姓名【Outlook全名】</label>
                        <p id="resName" class="text-lg text-gray-800 font-medium border-b pb-1"></p>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">舊愛類別</label>
                        <p id="resCategory" class="text-lg text-gray-800 font-medium border-b pb-1"></p>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">舊愛名稱</label>
                    <p id="resItem" class="text-lg text-blue-700 font-bold border-b pb-1"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">數量</label>
                        <p id="resQty" class="text-lg text-gray-800 font-medium border-b pb-1"></p>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">預計售價</label>
                        <p id="resPrice" class="text-lg text-green-600 font-bold border-b pb-1"></p>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">功能說明</label>
                    <div id="resDesc" class="p-3 bg-white/50 rounded-lg text-gray-700 italic border-l-4 border-blue-400"></div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">舊愛小故事</label>
                    <div id="resStory" class="p-3 bg-pink-50/50 rounded-lg text-gray-700 border-l-4 border-pink-400"></div>
                </div>

                <div class="flex items-center justify-between mt-6 p-4 bg-yellow-50/80 rounded-xl border border-yellow-100">
                    <span class="text-sm font-bold text-yellow-800"><i class="fas fa-map-marker-alt mr-2"></i>捐物位置</span>
                    <span id="resLocation" class="text-lg font-bold text-yellow-900"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="emptyMessage" class="hidden text-center p-12 glass-morphism rounded-2xl mt-4 fade-in">
        <i class="fas fa-search-minus text-4xl text-gray-300 mb-4"></i>
        <p class="text-gray-500 text-lg">找不到該編號的登記資料，請確認編號是否正確。</p>
    </div>
</div>

<script>
    // [資料庫內容 marketplaceData 保持不變...]
    const marketplaceData = [
        /* ... 此處省略您提供的 300 多筆資料，請保留原有的資料陣列 ... */
    ];

    function performSearch() {
        const input = document.getElementById('searchInput');
        const id = parseInt(input.value);
        const resultContainer = document.getElementById('resultContainer');
        const emptyMessage = document.getElementById('emptyMessage');
        const errorTip = document.getElementById('errorTip');

        errorTip.classList.add('hidden');

        if (!id) {
            errorTip.classList.remove('hidden');
            return;
        }

        const data = marketplaceData.find(item => item["編號"] === id);

        if (data) {
            document.getElementById('displayId').innerText = `編號 #${data["編號"]}`;
            document.getElementById('resName').innerText = data["姓名【Outlook全名】"] || '無資料';
            document.getElementById('resCategory').innerText = data["舊愛類別"] || '無資料';
            document.getElementById('resItem').innerText = data["舊愛"] || '無資料';
            document.getElementById('resQty').innerText = data["數量"] || '0';
            document.getElementById('resPrice').innerText = data["舊愛售價【請以百元倍數定價】"] || '無報價';
            document.getElementById('resDesc').innerText = data["舊愛功能說明"] || '尚無詳細說明';
            document.getElementById('resStory').innerText = data["舊愛小故事"] || '這件物品正等待新的故事...';
            document.getElementById('resLocation').innerText = data["捐物位置"] || '未註明';

            resultContainer.classList.remove('hidden');
            emptyMessage.classList.add('hidden');
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
            resultContainer.classList.add('hidden');
            emptyMessage.classList.remove('hidden');
        }
    }

    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
</script>

</body>
</html>
