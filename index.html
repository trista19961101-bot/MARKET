    function performSearch() {
        const input = document.getElementById('searchInput');
        const id = parseInt(input.value);
        const resultContainer = document.getElementById('resultContainer');
        const emptyMessage = document.getElementById('emptyMessage');
        const errorTip = document.getElementById('errorTip');

        errorTip.classList.add('hidden');

        if (!id) {
            errorTip.classList.remove('hidden');
            return;
        }

        const data = marketplaceData.find(item => item["編號"] === id);

        if (data) {
            document.getElementById('displayId').innerText = `編號 #${data["編號"]}`;
            document.getElementById('resName').innerText = data["舊愛主人"] || '無資料';
            document.getElementById('resCategory').innerText = data["舊愛類別"] || '無資料';
            document.getElementById('resItem').innerText = data["舊愛"] || '無資料';
            document.getElementById('resPrice').innerText = data["舊愛售價"] || '無報價';
            document.getElementById('resDesc').innerText = data["舊愛功能說明"] || '尚無詳細說明';
            document.getElementById('resStory').innerText = data["舊愛小故事"] || '這件物品正等待新的故事...';
            document.getElementById('resLocation').innerText = data["捐物位置"] || '未註明';

            resultContainer.classList.remove('hidden');
            emptyMessage.classList.add('hidden');
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
            resultContainer.classList.add('hidden');
            emptyMessage.classList.remove('hidden');
        }
    }

    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
